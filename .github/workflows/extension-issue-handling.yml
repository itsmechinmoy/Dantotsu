name: Extension Issue Handling
on:
  issues:
    types: [opened, labeled]

jobs:
  handle-extension-issues:
    runs-on: ubuntu-latest
    steps:
      - name: Check Issue Content
        id: check-issue
        env:
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_BODY: ${{ github.event.issue.body }}
        run: |
          # Regex patterns for extension-related issues
          EXTENSION_REGEX_PATTERNS=(
            # No extension available
            "(?i).*(no|can't find|cannot find|missing).*extension.*"
            
            # Extension not working
            "(?i).*(extension|server|stream).*(not working|can't work|doesnt work|doesn't work|not loading).*"
            
            # Specific server/stream issues
            "(?i).*(no streams|server).*(available|working).*"
            
            # Variants of extension problems
            "(?i).*{.*}.*not working.*"
            "(?i).*{.*}.*extension.*(issue|problem).*"
          )
          
          # Convert to lowercase for case-insensitive matching
          LOWER_TITLE=$(echo "$ISSUE_TITLE" | tr '[:upper:]' '[:lower:]')
          LOWER_BODY=$(echo "$ISSUE_BODY" | tr '[:upper:]' '[:lower:]')
          
          # Flag to track issue type
          IS_EXTENSION_ISSUE=false
          IS_NO_EXTENSION_ISSUE=false
          
          # Check title and body against regex patterns
          for pattern in "${EXTENSION_REGEX_PATTERNS[@]}"; do
            if [[ "$LOWER_TITLE" =~ $pattern || "$LOWER_BODY" =~ $pattern ]]; then
              IS_EXTENSION_ISSUE=true
              
              # Special check for no extensions available
              if [[ "$LOWER_TITLE" =~ "no extension" || "$LOWER_TITLE" =~ "can't find extension" ]]; then
                IS_NO_EXTENSION_ISSUE=true
              fi
              
              break
            fi
          done
          
          echo "is_extension_issue=$IS_EXTENSION_ISSUE" >> $GITHUB_OUTPUT
          echo "is_no_extension_issue=$IS_NO_EXTENSION_ISSUE" >> $GITHUB_OUTPUT

      - name: Comment and Close Extension Issue
        if: steps.check-issue.outputs.is_extension_issue == 'true'
        uses: actions/github-script@v6
        with:
          github-token: ${{secrets.GITHUB_TOKEN}}
          script: |
            const issueNumber = context.issue.number;
            
            // Check if it's a "No Extension" issue
            if (${{ steps.check-issue.outputs.is_no_extension_issue }}) {
              // DMCA notice message
              const noExtensionMessage = `Automated Message
On 13 June 2024 the official aniyomi repository got a DMCA notice and had to remove all of their extensions. Because of this we will not be providing anyone any links or extensions to avoid legal problems.

For this reason asking/sharing repo or extensions is prohibited in this server. Asking for it in DM's is also prohibited. If you are found doing this you could be warned or banned.
How to add repos?
Although we do not give or maintain any repositories, We do however support adding custom repository links to your Dantotsu.

Go to Profile > Settings > Extensions then paste your anime or manga links there.
How to find repos?
It's very easy. Search on Google. But keep in mind that the URL must end with index.min.json or else it won't work.
TLDR: We will not give repo links.`;

              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issueNumber,
                body: noExtensionMessage
              });
            } else {
              // Standard extension issue message
              const extensionIssueMessage = `Dantotsu doesn't maintain extensions.
If the extension doesn't work we cannot help you. 
Contact the owner of Respective Repo for extension-related problems`;

              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issueNumber,
                body: extensionIssueMessage
              });
            }
            
            // Close the issue
            await github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNumber,
              state: 'closed'
            });
