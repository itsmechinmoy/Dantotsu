name: Extension Issue Handling
on:
  issues:
    types: [opened, labeled]

jobs:
  handle-extension-issues:
    runs-on: ubuntu-latest
    steps:
      - name: Fetch Extensions List
        id: fetch-extensions
        run: |
          EXTENSIONS_JSON_URL="https://raw.githubusercontent.com/Kohi-den/extensions/main/index.min.json"
          echo "Fetching extension data from $EXTENSIONS_JSON_URL"
          
          # Download and parse JSON to extract extension names
          curl -s $EXTENSIONS_JSON_URL | jq -r '.[].name' | sed 's/^Aniyomi: //' > extensions_list.txt
          
          echo "Fetched Extensions:"
          cat extensions_list.txt
          
          # Save as output
          echo "extensions_file=extensions_list.txt" >> $GITHUB_OUTPUT

      - name: Check Issue Content
        id: check-issue
        env:
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_BODY: ${{ github.event.issue.body }}
        run: |
          # Convert title and body to lowercase for case-insensitive comparison
          LOWER_TITLE=$(echo "$ISSUE_TITLE" | tr '[:upper:]' '[:lower:]')
          LOWER_BODY=$(echo "$ISSUE_BODY" | tr '[:upper:]' '[:lower:]')
          
          # Initialize flags
          IS_EXTENSION_ISSUE=false
          REPORTED_EXTENSION=""
          
          # Compare reported content against the list of extensions
          while IFS= read -r extension; do
            LOWER_EXTENSION=$(echo "$extension" | tr '[:upper:]' '[:lower:]')
            if [[ "$LOWER_TITLE" =~ $LOWER_EXTENSION || "$LOWER_BODY" =~ $LOWER_EXTENSION ]]; then
              IS_EXTENSION_ISSUE=true
              REPORTED_EXTENSION="$extension"
              break
            fi
          done < "${{ steps.fetch-extensions.outputs.extensions_file }}"
          
          # Output results
          echo "is_extension_issue=$IS_EXTENSION_ISSUE" >> $GITHUB_OUTPUT
          echo "reported_extension=$REPORTED_EXTENSION" >> $GITHUB_OUTPUT

      - name: Comment and Close Extension Issue
        if: steps.check-issue.outputs.is_extension_issue == 'true'
        uses: actions/github-script@v6
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const issueNumber = context.issue.number;
            const reportedExtension = "${{ steps.check-issue.outputs.reported_extension }}";

            // Comment for valid extension issues
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNumber,
              body: `**Detected Issue with Extension:** ${reportedExtension}\n\n` +
                "Unfortunately, Dantotsu does not maintain extensions. If this extension doesn't work, please contact the respective repository owner.\n\n" +
                "_We recommend checking the extension source or updating to the latest version from your repository._"
            });

            // Label the issue as 'wontfix'
            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNumber,
              labels: ['wontfix']
            });

            // Close the issue
            await github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNumber,
              state: 'closed'
            });

      - name: Handle Non-Extension Issues
        if: steps.check-issue.outputs.is_extension_issue != 'true'
        uses: actions/github-script@v6
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const issueNumber = context.issue.number;
            
            // Comment for issues unrelated to extensions
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNumber,
              body: "This issue does not match any known extension names. Please provide clear details and ensure the extension name is correct."
            });
